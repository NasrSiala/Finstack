# Spark application configuration
spark.master                     spark://spark-master:7077
spark.eventLog.enabled           true
spark.eventLog.dir               /opt/bitnami/spark/logs
spark.history.fs.logDirectory    /opt/bitnami/spark/logs

# Spark driver configuration
spark.driver.memory              2g
spark.driver.cores               2
spark.driver.maxResultSize       1g

# Spark executor configuration
spark.executor.memory            4g
spark.executor.cores             2
spark.executor.instances         3

# Memory management
spark.memory.fraction            0.8
spark.memory.storageFraction     0.3

# Cassandra connector configuration
spark.cassandra.connection.host           cassandra-node1,cassandra-node2,cassandra-node3
spark.cassandra.connection.port           9042
spark.cassandra.connection.keep_alive_ms  60000
spark.cassandra.auth.username             cassandra
spark.cassandra.auth.password             cassandra

# Extensions and Packages
spark.sql.extensions                      com.datastax.spark.connector.CassandraSparkExtensions

# Input/Output configuration
spark.sql.adaptive.enabled       true
spark.sql.adaptive.coalescePartitions.enabled  true
spark.sql.shuffle.partitions     200

# Serialization
spark.serializer                 org.apache.spark.serializer.KryoSerializer
spark.kryo.registrationRequired  false

# Performance tuning
spark.default.parallelism        8
spark.sql.files.maxPartitionBytes  134217728
spark.sql.files.openCostInBytes    4194304

# Monitoring
spark.ui.port                    8080
spark.ui.enabled                 true
spark.ui.reverseProxy            false
